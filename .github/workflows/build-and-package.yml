name: Build and Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish Minimal
      run: dotnet publish Yukari/Yukari.csproj -c Release -r win-x64 --self-contained false -p:PublishProfile=win-x64.pubxml

    - name: Create Minimal Zip
      shell: pwsh
      run: |
        Compress-Archive -Path Yukari/bin/x64/Release/net10.0-windows*/win-x64/publish/* -DestinationPath Yukari.Minimal.x64.zip

    - name: Publish Full for Setup
      run: dotnet publish Yukari/Yukari.csproj -c Release -r win-x64 --self-contained true -p:PublishProfile=win-x64.pubxml

    - name: Compile Inno Setup
      shell: pwsh
      run: |
        & "iscc.exe" Packaging/yukari.iss

    - name: Upload Minimal Zip
      uses: actions/upload-artifact@v4
      with:
        name: Yukari.Minimal.x64
        path: Yukari.Minimal.x64.zip

    - name: Upload Setup Exe
      uses: actions/upload-artifact@v4
      with:
        name: Yukari.Setup.x64
        path: Packaging/Yukari.Setup.x64*.exe
